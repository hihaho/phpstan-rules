name: PHPStan

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
      - 'phpstan.neon.dist'
      - 'phpstan-baseline.neon'
      - 'extension.neon'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/phpstan.yml'
  pull_request:
    paths:
      - '**.php'
      - 'phpstan.neon.dist'
      - 'phpstan-baseline.neon'
      - 'extension.neon'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/phpstan.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpstan:
    name: phpstan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Install composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0

      - name: Cache PHPStan results
        uses: actions/cache@v5
        with:
          path: .cache/phpstan/
          key: phpstan-result-cache-${{ hashFiles('composer.lock', 'phpstan.neon.dist') }}
          restore-keys: phpstan-result-cache-

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --error-format=github --no-interaction --no-ansi
