name: Auto-fix

on:
  pull_request:
    paths:
      - '**.php'
      - 'rector.php'
      - 'pint.json'
      - '.github/workflows/auto-fix.yml'

permissions:
  contents: write

concurrency:
  group: auto-fix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-fix:
    # Skip fork PRs: their GITHUB_TOKEN cannot push back anyway (the
    # final git-auto-commit-action would fail permission-denied), and
    # running their rector.php / pint.json in a write-enabled context
    # trips CodeQL's "untrusted code in trusted context" rule.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          # Defuse "untrusted code in trusted context": don't leave the
          # workflow token in the git config so malicious PR code run
          # during Rector/Pint can't piggy-back on it. The auto-commit
          # action below picks up GITHUB_TOKEN from env, not from git.
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0

      - name: Cache Rector results
        uses: actions/cache@v5
        with:
          path: .cache/rector/
          key: rector-cache-${{ hashFiles('rector.php') }}
          restore-keys: rector-cache-

      - name: Cache Pint results
        uses: actions/cache@v5
        with:
          path: .cache/pint/
          key: pint-cache-${{ hashFiles('pint.json') }}
          restore-keys: pint-cache-

      - name: Run Rector
        run: vendor/bin/rector process --no-diffs

      - name: Run Pint
        uses: aglipanci/laravel-pint-action@36de00d5f5a8a4e12d443e01671daa12a18f4c79 # 2.6
        with:
          configPath: pint.json
          verboseMode: true

      # Re-attach push credentials only now — after the PR-controlled
      # rector.php / pint.json have already executed — so untrusted code never
      # runs with a write token in git config (the reason checkout used
      # persist-credentials: false), while the auto-commit step below can still
      # push. git-auto-commit-action does not authenticate itself; it relies on
      # the remote's credentials, which the hardened checkout deliberately omits.
      - name: Restore push credentials
        run: git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore: auto-fix'
          # Only commit what Rector/Pint actually format. The default pattern
          # ('.') also captures composer-install side effects — notably the
          # environment-specific .config/boost/manifest.json regenerated by the
          # post-install boost sync — which produced spurious "auto-fix" commits
          # on every PR and then failed to push.
          file_pattern: '*.php **/*.php'
