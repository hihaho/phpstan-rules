name: "Update Changelog"

on:
  release:
    types: [released]

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      RELEASE_TARGET: ${{ github.event.release.target_commitish }}
      RELEASE_BODY: ${{ github.event.release.body }}
      RELEASE_URL: ${{ github.event.release.html_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TARGET }}

      - name: Update Changelog
        uses: stefanzweifel/changelog-updater-action@a938690fad7edf25368f37e43a1ed1b34303eb36 # v1
        with:
          latest-version: ${{ env.RELEASE_TAG }}
          release-notes: ${{ env.RELEASE_BODY }}

      - name: Open CHANGELOG PR
        uses: peter-evans/create-pull-request@271a8d0340265f705aeb7f0e1e16e9b7d9b2d7e6 # v7.0.8
        with:
          branch: chore/changelog-${{ env.RELEASE_TAG }}
          base: ${{ env.RELEASE_TARGET }}
          commit-message: "Update CHANGELOG for ${{ env.RELEASE_TAG }}"
          title: "Update CHANGELOG for ${{ env.RELEASE_TAG }}"
          body: |
            Auto-generated by the `Update Changelog` workflow after publishing
            [${{ env.RELEASE_TAG }}](${{ env.RELEASE_URL }}).

            This workflow prepends the release body to `CHANGELOG.md` and
            opens this pull request instead of committing directly to `main`.
            Safe to merge once CI is green.
          add-paths: CHANGELOG.md
          delete-branch: true
